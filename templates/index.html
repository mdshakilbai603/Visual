<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI MASTER | Professional Editor</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #000; color: #fff; font-family: 'Inter', sans-serif; }
        .glass { background: rgba(15, 15, 15, 0.85); backdrop-filter: blur(15px); border: 1px solid #1a1a1a; border-radius: 30px; }
        .tool-btn { background: #111; border: 1px solid #222; padding: 15px; border-radius: 15px; width: 100%; text-align: left; transition: 0.3s; }
        .tool-btn:hover { border-color: #3b82f6; background: #1a1a1a; }
        .active { border-color: #3b82f6; color: #3b82f6; background: rgba(59, 130, 246, 0.1); }
    </style>
</head>
<body class="p-4 md:p-10">
    <div class="max-w-6xl mx-auto space-y-6">
        <header class="flex justify-between items-center glass p-6">
            <h1 class="text-2xl font-black italic text-blue-500 tracking-tighter">AI MASTER V3</h1>
            <div class="h-3 w-3 bg-green-500 rounded-full animate-pulse"></div>
        </header>

        <div class="grid md:grid-cols-12 gap-6">
            <div class="md:col-span-4 glass p-6 space-y-4">
                <h3 class="text-[10px] text-zinc-500 font-bold uppercase tracking-widest">Editing Tools</h3>
                <button onclick="setTask('cinematic', this)" class="tool-btn active">Cinematic Grade</button>
                <button onclick="setTask('slowmo', this)" class="tool-btn">Slow Motion</button>
                <button onclick="setTask('dubbing', this)" class="tool-btn">AI Dubbing</button>
                <button onclick="setTask('hdr', this)" class="tool-btn">HDR Enhancement</button>
            </div>

            <div class="md:col-span-8 glass p-6 flex flex-col items-center">
                <div class="w-full aspect-video bg-black rounded-2xl mb-6 flex items-center justify-center border border-zinc-900 overflow-hidden">
                    <video id="preview" class="hidden w-full h-full" controls></video>
                    <p id="loader" class="text-zinc-700 font-bold text-xs uppercase tracking-[0.4em]">Engine Standby</p>
                </div>

                <form id="renderForm" class="w-full space-y-4">
                    <input type="file" name="video" class="w-full text-xs text-zinc-500 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:bg-blue-600 file:text-white" required>
                    <input type="hidden" name="task" id="taskInput" value="cinematic">
                    <button type="submit" id="submitBtn" class="w-full bg-white text-black font-black py-4 rounded-2xl uppercase text-xs tracking-widest hover:bg-blue-600 hover:text-white transition">Execute Render</button>
                    <a id="downloadBtn" class="hidden block w-full text-center bg-green-600 py-4 rounded-2xl font-bold uppercase text-xs">Save to Device</a>
                </form>
            </div>
        </div>
    </div>

    <script>
        function setTask(task, el) {
            document.getElementById('taskInput').value = task;
            document.querySelectorAll('.tool-btn').forEach(b => b.classList.remove('active'));
            el.classList.add('active');
        }

        document.getElementById('renderForm').onsubmit = async (e) => {
            e.preventDefault();
            const btn = document.getElementById('submitBtn');
            btn.innerText = "PROCESSING...";
            btn.disabled = true;

            const formData = new FormData(e.target);
            try {
                const res = await fetch('/edit', { method: 'POST', body: formData });
                const blob = await res.blob();
                const url = URL.createObjectURL(blob);
                
                document.getElementById('loader').classList.add('hidden');
                document.getElementById('preview').classList.remove('hidden');
                document.getElementById('preview').src = url;
                
                const dl = document.getElementById('downloadBtn');
                dl.href = url;
                dl.download = "AI_MASTER_VIDEO.mp4";
                dl.classList.remove('hidden');
            } catch (err) { alert("Error: " + err); }
            finally { btn.innerText = "EXECUTE RENDER"; btn.disabled = false; }
        };
    </script>
</body>
</html>
