<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI MASTER | Professional Video Editor</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #000; color: #fff; font-family: 'Inter', sans-serif; }
        .editor-container { background: #0f0f0f; border-radius: 24px; border: 1px solid #222; }
        .btn-active { border-color: #3b82f6; color: #3b82f6; background: rgba(59, 130, 246, 0.1); }
        video { border-radius: 15px; background: #000; }
    </style>
</head>
<body class="p-4 md:p-8">
    <div class="max-w-6xl mx-auto">
        <header class="flex justify-between items-center mb-6">
            <h1 class="text-2xl font-black italic tracking-tighter text-blue-500">AI MASTER PRO</h1>
            <div class="px-4 py-1 bg-zinc-900 rounded-full text-[10px] text-zinc-500 border border-zinc-800 uppercase">GPU Rendering Active</div>
        </header>

        <div class="grid lg:grid-cols-12 gap-6">
            <div class="lg:col-span-3 space-y-3 order-2 lg:order-1">
                <p class="text-[10px] text-zinc-600 font-bold uppercase ml-2">Edit Features</p>
                <button onclick="setTask('cinematic', this)" class="w-full text-left p-4 rounded-2xl bg-zinc-900 border border-zinc-800 text-sm hover:border-blue-500 transition btn-active">Cinematic Grade</button>
                <button onclick="setTask('slowmo', this)" class="w-full text-left p-4 rounded-2xl bg-zinc-900 border border-zinc-800 text-sm hover:border-blue-500 transition">Ultra Slow-Mo</button>
                <button onclick="setTask('dubbing', this)" class="w-full text-left p-4 rounded-2xl bg-zinc-900 border border-zinc-800 text-sm hover:border-blue-500 transition">AI Voice Dub</button>
                <button onclick="setTask('hdr', this)" class="w-full text-left p-4 rounded-2xl bg-zinc-900 border border-zinc-800 text-sm hover:border-blue-500 transition">HDR Graphics</button>
            </div>

            <div class="lg:col-span-9 space-y-4 order-1 lg:order-2">
                <div class="editor-container p-4 aspect-video flex flex-col items-center justify-center relative">
                    <video id="player" class="hidden w-full h-full" controls></video>
                    <div id="placeholder" class="text-zinc-700 text-xs font-bold uppercase">No Asset Loaded</div>
                </div>

                <div class="editor-container p-6">
                    <form id="renderForm" class="flex flex-col md:flex-row gap-4 items-center">
                        <input type="file" name="video" class="flex-1 text-xs text-zinc-500 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:bg-blue-600 file:text-white" required>
                        <input type="hidden" name="task" id="taskValue" value="cinematic">
                        <button type="submit" id="submitBtn" class="w-full md:w-auto px-10 py-3 bg-white text-black font-black rounded-full text-xs uppercase hover:bg-blue-600 hover:text-white transition">Render & Play</button>
                        <a id="downloadBtn" class="hidden w-full md:w-auto px-10 py-3 bg-green-600 text-white font-black rounded-full text-xs text-center uppercase cursor-pointer">Save Video</a>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <script>
        function setTask(task, btn) {
            document.getElementById('taskValue').value = task;
            document.querySelectorAll('button').forEach(b => b.classList.remove('btn-active'));
            btn.classList.add('btn-active');
        }

        document.getElementById('renderForm').onsubmit = async (e) => {
            e.preventDefault();
            const btn = document.getElementById('submitBtn');
            btn.innerText = "RENDERING...";
            btn.disabled = true;

            const formData = new FormData(e.target);
            try {
                const res = await fetch('/edit', { method: 'POST', body: formData });
                const blob = await res.blob();
                const url = URL.createObjectURL(blob);
                
                document.getElementById('placeholder').style.display = 'none';
                const player = document.getElementById('player');
                player.classList.remove('hidden');
                player.src = url;
                player.play();

                // সেভ/ডাউনলোড বাটন অ্যাক্টিভ করা
                const dwn = document.getElementById('downloadBtn');
                dwn.href = url;
                dwn.download = "AI_MASTER_EDIT.mp4";
                dwn.classList.remove('hidden');

            } catch (err) { alert("Error: " + err); }
            finally { btn.innerText = "RENDER & PLAY"; btn.disabled = false; }
        };
    </script>
</body>
</html>
