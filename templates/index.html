<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI MASTER | Pro Editor</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #000; color: #fff; font-family: 'Inter', sans-serif; }
        .glass-card { background: rgba(255, 255, 255, 0.02); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.1); border-radius: 40px; }
        .preview-box { width: 100%; max-width: 500px; margin: 20px auto; display: none; }
        video { width: 100%; border-radius: 20px; border: 1px solid #333; }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen p-6">
    <div class="glass-card p-10 w-full max-w-2xl text-center">
        <h1 class="text-4xl font-thin tracking-widest mb-10">AI MASTER <span class="font-bold opacity-20">PRO</span></h1>
        
        <div id="videoPreview" class="preview-box">
            <p class="text-[10px] tracking-[0.5em] text-green-500 mb-4">RENDERING COMPLETE</p>
            <video id="player" controls autoplay loop></video>
            <div class="mt-6">
                <button onclick="window.location.reload()" class="text-[10px] tracking-widest border border-white/20 px-6 py-3 rounded-full hover:bg-white hover:text-black transition">EDIT ANOTHER</button>
            </div>
        </div>

        <form id="uploadForm" action="/edit" method="POST" enctype="multipart/form-data">
            <div class="border-2 border-dashed border-neutral-800 rounded-[30px] p-16 mb-8 hover:border-white transition-all cursor-pointer relative">
                <input type="file" name="video" class="absolute inset-0 opacity-0 cursor-pointer" required onchange="updateName(this)">
                <p id="fileLabel" class="text-neutral-500 text-xs tracking-widest uppercase">Select Video Asset</p>
            </div>
            
            <input type="text" name="text" placeholder="Enter Overlay Text" class="w-full bg-transparent border-b border-neutral-800 py-4 mb-10 outline-none focus:border-white text-center uppercase tracking-widest">
            
            <button type="submit" id="btn" class="w-full bg-white text-black py-5 rounded-2xl font-bold tracking-widest text-[10px] uppercase">Initialize AI Render</button>
        </form>
    </div>

    <script>
        function updateName(input) {
            if(input.files[0]) document.getElementById('fileLabel').innerText = "LOADED: " + input.files[0].name.toUpperCase();
        }

        document.getElementById('uploadForm').onsubmit = async (e) => {
            e.preventDefault();
            const btn = document.getElementById('btn');
            btn.innerText = "PROCESSING...";
            btn.disabled = true;

            const formData = new FormData(e.target);
            const response = await fetch('/edit', { method: 'POST', body: formData });
            
            if(response.ok) {
                const blob = await response.blob();
                const url = URL.createObjectURL(blob);
                document.getElementById('uploadForm').style.display = 'none';
                document.getElementById('videoPreview').style.display = 'block';
                document.getElementById('player').src = url;
            } else {
                alert("Processing Failed!");
                btn.innerText = "TRY AGAIN";
                btn.disabled = false;
            }
        };
    </script>
</body>
</html>
