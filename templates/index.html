<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI MASTER | Professional Mobile Editor</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #000; color: #fff; font-family: 'Inter', sans-serif; }
        .glass { background: rgba(20, 20, 20, 0.7); backdrop-filter: blur(12px); border: 1px solid #222; }
        .tool-card { background: #111; border: 1px solid #222; transition: 0.2s; }
        .tool-card:active { transform: scale(0.95); border-color: #3b82f6; }
        .active-tool { border-color: #3b82f6; background: #1a1a1a; color: #3b82f6; }
        /* Hide scrollbar */
        ::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="bg-black min-h-screen flex flex-col">
    <header class="p-5 flex justify-between items-center glass sticky top-0 z-50">
        <h1 class="font-black italic text-xl tracking-tighter text-blue-500">AI MASTER</h1>
        <div class="h-2 w-2 bg-green-500 rounded-full animate-pulse"></div>
    </header>

    <main class="flex-1 p-4 flex flex-col gap-4 max-w-4xl mx-auto w-full">
        <div class="aspect-video glass rounded-[30px] flex items-center justify-center overflow-hidden relative">
            <video id="mainVideo" class="hidden w-full h-full object-contain" controls></video>
            <div id="status" class="text-[10px] text-zinc-600 uppercase tracking-[0.4em]">Engine Standby</div>
        </div>

        <div class="flex gap-3 overflow-x-auto pb-2" id="tools">
            <button onclick="setTask('cinematic', this)" class="tool-card px-6 py-3 rounded-2xl whitespace-nowrap text-xs font-bold active-tool">Cinematic LUT</button>
            <button onclick="setTask('slowmo', this)" class="tool-card px-6 py-3 rounded-2xl whitespace-nowrap text-xs font-bold">Slow Motion</button>
            <button onclick="setTask('dubbing', this)" class="tool-card px-6 py-3 rounded-2xl whitespace-nowrap text-xs font-bold">AI Dubbing</button>
            <button onclick="setTask('bw', this)" class="tool-card px-6 py-3 rounded-2xl whitespace-nowrap text-xs font-bold">B&W Classic</button>
            <button onclick="setTask('hdr', this)" class="tool-card px-6 py-3 rounded-2xl whitespace-nowrap text-xs font-bold">HDR Boost</button>
        </div>

        <form id="masterForm" class="glass p-6 rounded-[30px] space-y-4">
            <input type="file" name="video" class="block w-full text-xs text-zinc-500 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:bg-blue-600 file:text-white" required>
            
            <input type="hidden" name="task" id="taskInput" value="cinematic">
            
            <button type="submit" id="submitBtn" class="w-full bg-white text-black font-black py-4 rounded-2xl uppercase text-xs tracking-widest hover:bg-blue-500 hover:text-white transition">Render Output</button>
        </form>
    </main>

    <script>
        function setTask(task, btn) {
            document.getElementById('taskInput').value = task;
            document.querySelectorAll('.tool-card').forEach(b => b.classList.remove('active-tool'));
            btn.classList.add('active-tool');
        }

        document.getElementById('masterForm').onsubmit = async (e) => {
            e.preventDefault();
            const btn = document.getElementById('submitBtn');
            btn.innerText = "PROCESSING...";
            btn.disabled = true;

            const formData = new FormData(e.target);
            try {
                const res = await fetch('/process', { method: 'POST', body: formData });
                const blob = await res.blob();
                document.getElementById('status').classList.add('hidden');
                document.getElementById('mainVideo').classList.remove('hidden');
                document.getElementById('mainVideo').src = URL.createObjectURL(blob);
            } catch (err) { alert("Error: " + err); }
            finally { btn.innerText = "RENDER OUTPUT"; btn.disabled = false; }
        };
    </script>
</body>
</html>
